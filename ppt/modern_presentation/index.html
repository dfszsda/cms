<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Internship Presentation - CMS & Gokudiyugam</title>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --secondary: #94a3b8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .navbar {
            width: 100%;
            padding: 1rem 2rem;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #334155;
            box-sizing: border-box;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: white;
        }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }

        #slides-container {
            width: 100%;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            box-sizing: border-box;
        }
        .slide-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            cursor: default;
        }
        .slide-label {
            font-size: 0.875rem;
            color: var(--secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: grab;
            background: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .slide-label:active { cursor: grabbing; }
        .slide-label i { color: var(--primary); }

        .sortable-ghost {
            opacity: 0.3;
        }
        .sortable-drag {
            opacity: 0.8;
            background: var(--card-bg);
        }

        .slide-frame-container {
            width: 1280px;
            height: 720px;
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            transform: scale(0.65);
            transform-origin: top center;
            margin-bottom: -250px;
        }
        @media (max-width: 1024px) {
            .slide-frame-container { transform: scale(0.5); margin-bottom: -360px; }
        }
        @media (max-width: 640px) {
            .slide-frame-container { transform: scale(0.3); margin-bottom: -500px; }
        }
        iframe {
            width: 1280px;
            height: 720px;
            border: none;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .spinner {
            width: 64px; height: 64px;
            border: 6px solid #1e293b;
            border-top: 6px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-status { margin-top: 2rem; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <span>Modern Internship Presentation</span>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="generatePPT()">
                <i class="fas fa-download"></i> Export PPTX
            </button>
        </div>
    </nav>

    <div id="slides-container"></div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div id="loading-status">
            <h2>Generating High-Res PPTX</h2>
            <p id="progress-text">Ready to begin...</p>
        </div>
    </div>

    <script>
        const totalSlides = 13;
        const container = document.getElementById('slides-container');

        // Initial slide order: [0, 1, 2, 3, 4, 5, 6, 11, 7, 8, 9, 10, 12, 13]
        let slideOrder = Array.from({length: totalSlides + 1}, (_, i) => i);
        const index11 = slideOrder.indexOf(11);
        slideOrder.splice(index11, 1);
        const index7 = slideOrder.indexOf(7);
        slideOrder.splice(index7, 0, 11);

        function renderSlides() {
            container.innerHTML = '';
            slideOrder.forEach(i => {
                const slideCard = document.createElement('div');
                slideCard.className = 'slide-card';
                slideCard.setAttribute('data-id', i);
                slideCard.innerHTML = `
                    <div class="slide-label">
                        <i class="fas fa-grip-vertical"></i>
                        <span>Slide ${i} ${i === 0 ? '(Title)' : ''}</span>
                    </div>
                    <div class="slide-frame-container">
                        <iframe src="${i}.html" id="slide-frame-${i}" loading="lazy"></iframe>
                    </div>
                `;
                container.appendChild(slideCard);
            });
        }

        renderSlides();

        // Initialize Sortable
        new Sortable(container, {
            animation: 150,
            handle: '.slide-label',
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag'
        });

        async function generatePPT() {
            const loading = document.getElementById('loading');
            const progressText = document.getElementById('progress-text');
            loading.style.display = 'flex';

            try {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_WIDE';

                const slideCards = container.querySelectorAll('.slide-card');

                for (let i = 0; i < slideCards.length; i++) {
                    const slideId = slideCards[i].getAttribute('data-id');
                    progressText.innerText = `Capturing Slide ${i + 1} of ${slideCards.length} (Source: ${slideId}.html)...`;

                    const iframe = slideCards[i].querySelector('iframe');
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

                    // Ensure slide is loaded
                    await new Promise(r => setTimeout(r, 1200));

                    const canvas = await html2canvas(iframeDoc.body, {
                        width: 1280, height: 720, scale: 2, useCORS: true
                    });

                    pptx.addSlide().addImage({
                        data: canvas.toDataURL('image/png'),
                        x: 0, y: 0, w: '100%', h: '100%'
                    });
                }

                progressText.innerText = 'Finalizing PPTX...';
                pptx.writeFile({ fileName: 'Internship_Presentation_Modern.pptx' });
                setTimeout(() => loading.style.display = 'none', 2000);
            } catch (error) {
                console.error(error);
                alert('Generation failed. Ensure all slide files exist and are accessible.');
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
