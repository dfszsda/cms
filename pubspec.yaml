name: cms
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.5+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  shared_preferences: ^2.5.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  file_picker: ^8.1.7
  path_provider: ^2.1.2
  http: ^1.2.1
  url_launcher: ^6.3.1
  table_calendar: ^3.1.2
  pdf: ^3.11.1
  printing: ^5.13.2
  webview_flutter: ^4.10.0
  crypto: ^3.0.6
  razorpay_flutter: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/raw/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/raw/logo.png
    - lib/raw/icon.png
