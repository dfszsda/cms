<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Lifecycle - Flowchart</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --border: #1e293b;
            --phase1: #f1f5f9;
            --phase2: #dcfce7;
            --phase3: #dbeafe;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 1100px; background: white; padding: 50px; border: 2px solid var(--border); }
        h1 { text-align: center; margin-bottom: 50px; }

        .swimlane { display: flex; flex-direction: column; border: 2px solid var(--border); }
        .lane { display: flex; min-height: 160px; border-bottom: 2px solid var(--border); }
        .lane:last-child { border-bottom: none; }

        .lane-header {
            width: 70px; background: #334155; color: white; border-right: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            writing-mode: vertical-lr; transform: rotate(180deg);
        }

        .lane-content { flex-grow: 1; padding: 25px; display: flex; align-items: center; gap: 30px; position: relative; }

        .node {
            padding: 12px 18px; border: 2px solid var(--border); min-width: 120px; text-align: center;
            font-weight: 600; font-size: 0.85rem; position: relative;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }
        .oval { border-radius: 50px; }
        .rect { border-radius: 4px; }

        .p1 { background: var(--phase1); }
        .p2 { background: var(--phase2); }
        .p3 { background: var(--phase3); }

        .arrow-h { width: 30px; height: 2px; background: var(--border); position: relative; }
        .arrow-h::after {
            content: ''; position: absolute; right: -2px; top: -5px;
            border-left: 8px solid var(--border); border-top: 6px solid transparent; border-bottom: 6px solid transparent;
        }

        .btn { margin-top: 30px; padding: 12px 25px; background: #1e293b; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container" id="capture">
        <h1>Project Development Lifecycle</h1>
        <div class="swimlane">
            <div class="lane">
                <div class="lane-header">Planning</div>
                <div class="lane-content">
                    <div class="node oval p1">Analysis</div>
                    <div class="arrow-h"></div>
                    <div class="node rect p1">UI/UX Design</div>
                </div>
            </div>
            <div class="lane">
                <div class="lane-header">DevOps</div>
                <div class="lane-content">
                    <div style="width: 180px;"></div>
                    <div style="width: 180px;"></div>
                    <div class="node rect p2">Git Setup</div>
                    <div class="arrow-h"></div>
                    <div class="node rect p2">Repo Branching</div>
                </div>
            </div>
            <div class="lane">
                <div class="lane-header">Execution</div>
                <div class="lane-content">
                    <div style="width: 180px;"></div>
                    <div style="width: 180px;"></div>
                    <div style="width: 180px;"></div>
                    <div style="width: 180px;"></div>
                    <div class="node rect p3">Flutter Dev</div>
                    <div class="arrow-h"></div>
                    <div class="node rect p3">Firebase Sync</div>
                    <div class="arrow-h"></div>
                    <div class="node oval p3">QA Testing</div>
                </div>
            </div>
        </div>
    </div>
    <button class="btn" onclick="downloadImage()">Download JPG</button>
    <script>
        function downloadImage() {
            html2canvas(document.getElementById('capture'), { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Project_Lifecycle_Flow.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>
